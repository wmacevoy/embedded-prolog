name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc libc6-dev python3

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: |
          chmod +x test.sh
          ./test.sh
