services:
  dashboard:
    build:
      context: ../..
      dockerfile: examples/greenhouse/dashboard/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - LISTEN_PORT=9500
      - HTTP_PORT=3000
      - GATEWAY_ADDR=gateway:9500

  sensor:
    build:
      context: ../..
      dockerfile: examples/greenhouse/sensor/Dockerfile
    environment:
      - SENSOR_ID=sensor_1
      - COORDINATOR_ADDR=dashboard:9500
      - ESTIMATOR_ADDR=estimator:9500
      - LISTEN_PORT=9500
    depends_on:
      - dashboard
      - estimator

  sensor2:
    build:
      context: ../..
      dockerfile: examples/greenhouse/sensor/Dockerfile
    environment:
      - SENSOR_ID=sensor_2
      - COORDINATOR_ADDR=dashboard:9500
      - ESTIMATOR_ADDR=estimator:9500
      - LISTEN_PORT=9500
    depends_on:
      - dashboard
      - estimator

  estimator:
    build:
      context: ../..
      dockerfile: examples/greenhouse/estimator/Dockerfile
    environment:
      - LISTEN_PORT=9500
      - COORDINATOR_ADDR=dashboard:9500
    depends_on:
      - dashboard

  gateway:
    build:
      context: ../..
      dockerfile: examples/greenhouse/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LISTEN_PORT=9500
      - HTTP_PORT=8080
    depends_on:
      - dashboard
